<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cap Table Document Details</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:        #1DC9A4;
    --teal-dark:   #17a688;
    --red:         #e74c3c;
    --gray-50:     #f8f9fa;
    --gray-100:    #f1f3f4;
    --gray-200:    #e8eaed;
    --gray-400:    #bdc1c6;
    --gray-600:    #80868b;
    --gray-800:    #3c4043;
    --gray-900:    #202124;
    --blue-badge:  #e8f0fe;
    --blue-text:   #1a73e8;
    --green-badge: #e6f4ea;
    --green-text:  #137333;
    --red-badge:   #fce8e6;
    --red-text:    #c5221f;
    --amber-badge: #fef9c3;
    --amber-text:  #92400e;
    --purple-badge:#f3e8ff;
    --purple-text: #7c3aed;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --fs-xs:  10px;
    --fs-sm:  11px;
    --fs-base:12px;
    --fs-md:  13px;
  }

  body {
    font-family: var(--font);
    font-size: var(--fs-base);
    color: var(--gray-800);
    background: var(--gray-100);
    min-height: 100vh;
  }

  /* ── Nav ── */
  .topnav {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    height: 36px;
    display: flex; align-items: center;
    padding: 0 16px; gap: 4px;
    font-size: var(--fs-sm);
    position: sticky; top: 0; z-index: 100;
  }
  .topnav a { color: var(--teal); text-decoration: none; }
  .topnav a:hover { text-decoration: underline; }
  .topnav .sep { color: var(--gray-400); font-size: 14px; }
  .topnav .cur { color: var(--gray-600); }

  /* ── Page header ── */
  .page-hdr {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    padding: 8px 16px;
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px;
  }
  .page-title { font-size: var(--fs-md); font-weight: 600; color: var(--gray-900); }
  .hdr-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

  .btn {
    padding: 4px 11px; border: none; border-radius: 3px;
    font-size: var(--fs-xs); font-weight: 500; cursor: pointer;
    white-space: nowrap; line-height: 1.7;
  }
  .btn-teal  { background: var(--teal); color: #fff; }
  .btn-teal:hover { background: var(--teal-dark); }
  .btn-gray  { background: var(--gray-200); color: var(--gray-800); }
  .btn-gray:hover { background: var(--gray-400); }
  .btn-red   { background: var(--red); color: #fff; }
  .btn-red:hover { background: #c0392b; }
  .btn-icon  {
    padding: 3px 9px; background: var(--gray-50);
    border: 1px solid var(--gray-200); border-radius: 3px;
    cursor: pointer; font-size: 14px; color: var(--gray-600);
    line-height: 1.5;
  }
  .btn-icon:hover { background: var(--gray-200); }

  /* ── Demo bar ── */
  .demo-bar {
    background: #fffde7;
    border-bottom: 1px solid #f9a825;
    padding: 5px 16px;
    display: flex; align-items: center; gap: 14px;
    font-size: var(--fs-sm); color: #7b5800;
    flex-wrap: wrap;
  }
  .demo-bar b { font-weight: 700; }
  .demo-bar label { font-weight: 600; white-space: nowrap; }
  .demo-bar select {
    padding: 2px 7px; border: 1px solid #f9a825;
    border-radius: 3px; background: #fff;
    font-size: var(--fs-sm); color: var(--gray-800); cursor: pointer;
  }

  /* ── Body ── */
  .page-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }

  /* ── Info card ── */
  .info-card {
    background: #fff;
    border: 1px solid var(--gray-200); border-radius: 2px;
  }
  .info-row {
    display: flex; align-items: flex-start;
    border-bottom: 1px solid var(--gray-100); min-height: 28px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-lbl {
    width: 200px; min-width: 160px;
    padding: 5px 12px;
    font-size: var(--fs-sm); color: var(--gray-600); font-weight: 500;
  }
  .info-val {
    padding: 5px 12px;
    font-size: var(--fs-sm); color: var(--gray-800); flex: 1;
  }
  .info-val a { color: var(--teal); text-decoration: none; }
  .info-val a:hover { text-decoration: underline; }

  /* ── Section ── */
  .section {
    background: #fff;
    border: 1px solid var(--gray-200); border-radius: 2px; overflow: hidden;
  }
  .sec-hdr {
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 10px; height: 32px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .sec-hdr:hover { background: var(--gray-100); }
  .sec-title {
    display: flex; align-items: center; gap: 6px;
    font-size: var(--fs-sm); font-weight: 600; color: var(--gray-900);
  }
  .chevron {
    font-size: 13px; color: var(--gray-600);
    transition: transform .18s; display: inline-block; line-height: 1;
  }
  .chevron.open { transform: rotate(90deg); }
  .sec-right { display: flex; align-items: center; gap: 5px; }
  .sec-ico { font-size: 13px; color: var(--gray-400); cursor: pointer; }
  .sec-ico:hover { color: var(--gray-800); }
  .sec-body { display: block; }
  .sec-body.hidden { display: none; }

  /* ── JSON block ── */
  .json-pre {
    background: #1e2329;
    padding: 12px 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px; color: #abb2bf;
    line-height: 1.65;
    overflow-x: auto; max-height: 320px; overflow-y: auto;
  }
  .jk  { color: #e5c07b; }  /* key */
  .js  { color: #98c379; }  /* string */
  .jn  { color: #d19a66; }  /* number */
  .jb  { color: #56b6c2; }  /* bool */
  .jnu { color: #c678dd; }  /* null */

  /* ── KV table (equity / vesting details) ── */
  .type-bar {
    padding: 6px 12px;
    display: flex; align-items: center; gap: 8px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
  }
  .type-lbl { font-size: var(--fs-xs); color: var(--gray-600); font-weight: 600; font-family: monospace; }

  .kv { width: 100%; border-collapse: collapse; }
  .kv tr { border-bottom: 1px solid var(--gray-100); }
  .kv tr:last-child { border-bottom: none; }
  .kv tbody tr:hover td { background: #f7fffe; }

  .kv td:first-child {
    width: 280px; min-width: 180px;
    padding: 5px 13px 5px 14px;
    font-size: var(--fs-sm); color: var(--gray-600); font-weight: 500;
    vertical-align: top; line-height: 1.35;
  }
  .kv td:last-child {
    padding: 5px 14px;
    font-size: var(--fs-sm); color: var(--gray-800); vertical-align: top;
  }
  .field-key {
    font-family: 'Courier New', monospace;
    font-size: 9px; color: var(--gray-400);
    font-weight: 400; display: block; margin-top: 1px;
  }
  .null-v { color: var(--gray-400); }

  /* Milestone / sub-section header row */
  .kv-sub-hdr td {
    background: var(--gray-100) !important;
    font-size: var(--fs-xs) !important; font-weight: 700 !important;
    color: var(--gray-600) !important; text-transform: uppercase;
    letter-spacing: .5px; padding: 4px 14px !important;
    border-top: 1px solid var(--gray-200) !important;
    border-bottom: 1px solid var(--gray-200) !important;
  }

  /* ── Badges ── */
  .badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: var(--fs-xs); font-weight: 600; line-height: 1.7;
  }
  .b-blue   { background: var(--blue-badge);   color: var(--blue-text); }
  .b-green  { background: var(--green-badge);  color: var(--green-text); }
  .b-red    { background: var(--red-badge);    color: var(--red-text); }
  .b-amber  { background: var(--amber-badge);  color: var(--amber-text); }
  .b-gray   { background: var(--gray-100);     color: var(--gray-600); }
  .b-teal   { background: #d2f5ee;             color: #0d7a5f; }
  .b-purple { background: var(--purple-badge); color: var(--purple-text); }

  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot-g { background: #34a853; }
  .dot-r { background: #ea4335; }

  /* warn value */
  .warn-v { color: var(--red-text); font-weight: 600; }
</style>
</head>

    <div class="sec-body" id="vestingBody"><!-- filled by JS --></div>
  </div>

</div>

/* ──────────────────────────────────────────
   RENDERERS
────────────────────────────────────────── */
function row(label, key, val) {
  const v = val || '<span class="null-v">—</span>';
  return `<tr>
    <td>${label}<span class="field-key">${key}</span></td>
    <td>${v}</td>
  </tr>`;
}

function subHdr(text) {
  return `<tr class="kv-sub-hdr"><td colspan="2">${text}</td></tr>`;
}

function renderEquity(type) {
  const d = EQ[type]; if (!d) return '';
  const [cls, label] = BADGE_MAP[type];
  return `
    <div class="type-bar">
      <span class="type-lbl">equity_class:</span>
      <span class="badge ${cls}">${label}</span>
    </div>
    <table class="kv"><tbody>
      ${d.rows.map(r => row(r[0], r[1], r[2])).join('')}
    </tbody></table>`;
}

function renderVesting(type) {
  const d = VS[type]; if (!d) return '';
  const [cls, label] = d.badge;

  if (type === 'basic' || type === 'time_based') {
    return `
      <div class="type-bar">
        <span class="type-lbl">vesting_type:</span>
        <span class="badge ${cls}">${label}</span>
      </div>
      <table class="kv"><tbody>
        ${d.rows.map(r => row(r[0], r[1], r[2])).join('')}
      </tbody></table>`;
  }

  if (type === 'milestones') {
    let html = `
      <div class="type-bar">
        <span class="type-lbl">vesting_type:</span>
        <span class="badge ${cls}">${label}</span>
      </div>
      <table class="kv"><tbody>
        ${row('Vesting Type', 'vesting_type', 'milestones')}
        ${row('Plan name',    'vesting_plan_name', d.planName)}`;
    d.milestones.forEach((m, i) => {
      html += `
        ${subHdr('Milestone ' + (i + 1))}
        ${row('Title',                    `milestones[${i}].milestone_title`,       m.title)}
        ${row('Trigger description',      `milestones[${i}].trigger_description`,   m.trigger)}
        ${row('Percentage or shares',     `milestones[${i}].percentage_or_shares`,  m.value)}`;
    });
    html += `</tbody></table>`;
    return html;
  }

  if (type === 'hybrid') {
    let html = `
      <div class="type-bar">
        <span class="type-lbl">vesting_type:</span>
        <span class="badge ${cls}">${label}</span>
      </div>
      <table class="kv"><tbody>
        ${d.timeRows.map(r => row(r[0], r[1], r[2])).join('')}`;
    d.milestones.forEach((m, i) => {
      html += `
        ${subHdr('Milestone ' + (i + 1))}
        ${row('Title',               `hybrid.milestone_elements[${i}].milestone_title`,      m.title)}
        ${row('Trigger description', `hybrid.milestone_elements[${i}].trigger_description`,  m.trigger)}
        ${row('Percentage or shares',`hybrid.milestone_elements[${i}].percentage_or_shares`, m.value)}`;
    });
    html += `</tbody></table>`;
    return html;
  }
  return '';
}

/* ──────────────────────────────────────────
   UPDATERS
────────────────────────────────────────── */
function applyEquity() {
  const type = document.getElementById('selEquity').value;
  const [cls, lbl] = BADGE_MAP[type];
  document.getElementById('metaEquityBadge').innerHTML = `<span class="badge ${cls}">${lbl}</span>`;
  document.getElementById('metaDocType').textContent   = DOC_TYPE_MAP[type] || '—';
  document.getElementById('equityBody').innerHTML      = renderEquity(type);
  document.getElementById('jsonOut').innerHTML         = JSON_SAMPLES[type] || '// No sample available';
  document.getElementById('sec-vesting').style.display = NO_VESTING.includes(type) ? 'none' : '';
}

function applyVesting() {
  const type = document.getElementById('selVesting').value;
  document.getElementById('vestingBody').innerHTML = renderVesting(type);
}

function tog(id) {
  const s = document.getElementById(id);
  const b = s.querySelector('.sec-body');
  const c = s.querySelector('.chevron');
  const open = !b.classList.contains('hidden');
  b.classList.toggle('hidden', open);
  c.classList.toggle('open', !open);
}

/* ── Init ── */
applyEquity();
applyVesting();
